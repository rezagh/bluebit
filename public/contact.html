<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Blue Bit Consulting</title>
    <meta name="description" content="Get in touch with Blue Bit Consulting. We never charge for an initial chat about your project — whether you're a startup, small business, or enterprise.">
    <meta property="og:title" content="Contact Us - Blue Bit Consulting">
    <meta property="og:description" content="Get in touch with Blue Bit Consulting. Free initial consultation for your project.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://bluebit.com.au/contact.html">
    <link rel="icon" type="image/svg+xml" href="img/logo.svg">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header will be loaded here -->
    <div id="header-container"></div>

    <main>
        <div class="page-intro page-intro--green">
            <p>
                Whether you’re a startup, small business, or enterprise, we’d love to hear from you!<br>
                We never charge for an initial chat about your project requirements—no matter if your project is small or large.<br>
                Get in touch and let’s explore how we can help you succeed.
            </p>
        </div>
        <h1 class="page-heading">Contact Us</h1>
        <div class="contact-form">
            <form action="https://formspree.io/f/xqalqenw" method="POST" onsubmit="handleFormSubmit(event)">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" required></textarea>
                </div>
                <button type="submit" class="submit-btn">Send Message</button>
            </form>
            <div style="text-align:center; margin-top:2rem;">
                <a href="https://wa.me/61402636492" target="_blank" class="whatsapp-btn">
                    <span style="font-size:1.2em; vertical-align:middle;">💬</span> Chat with us on WhatsApp
                </a>
            </div>
        </div>
    </main>

    <!-- Footer will be loaded here -->
    <div id="footer-container"></div>

    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => setActivePage('contact'));
    </script>
</body>
</html>
